<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Edades</title>
</head>
<body>
    
    <div id="body">
        <section id="edad" hidden>
            <div>
         
                <h6 id="persona_lblPersona">Procesar Persona</h6>
            </div>
            <div>
                <label>Nombre:
                    <input type="text" id="persona_inNombre" placeholder="Ej:Carlos"/>
                </label>
            </div>
            <div>
                <label>Edad:
                    <input type="number" id="persona_inEdad" placeholder="Ej:25">
                </label>
            </div>
            <div>
                <button id="persona_btCancelar">Cancelar</button>
                <button id="persona_btAceptar">Aceptar</button>
            </div>
        </section>
        <hr>
        <div style="margin-bottom: 20px;">
            <button id="body_btProcesarPersonas">Procesar Persona</button>
        </div>

        <div>
             La cantidad de personas es: <span id="body_lblCantidadPersonas">0</span>
        </div>
        <div>
            Cantidad de personas mayores de edad es: <span id="body_lblCantidadPersonasMayores">0</span>
        </div>
        <div>
            Cantidad de personas menores de edad es: <span id="body_lblCantidadPersonasMenor">0</span>
        </div>
        <div>
            Porcentaje de personas menores de edad es: <span id="body_lblPorcentajePersonasMenor">0</span>%
        </div>
        
        <div>
            Porcentaje de personas mayores de edad: <span id="body_lblPorcentajePersonasMayores">0</span>%
        </div>
        
  <script type="module">
        import cEdad from "./dist/controllers/Cl_cEdad.js";
        new cEdad();
   </script>
</body> 
</html>
